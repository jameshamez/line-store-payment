<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hero" x1="80" y1="80" x2="1520" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06C755"/>
      <stop offset="0.55" stop-color="#048D3E"/>
      <stop offset="1" stop-color="#20A7A0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#16201C" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 800 54px Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 25px Arial, sans-serif; fill: rgba(255,255,255,0.86); }
      .label { font: 800 26px Arial, sans-serif; fill: #16201C; }
      .body { font: 400 20px Arial, sans-serif; fill: #65716B; }
      .num { font: 900 20px Arial, sans-serif; fill: #ffffff; }
      .note-title { font: 800 24px Arial, sans-serif; fill: #24513A; }
      .note { font: 400 20px Arial, sans-serif; fill: #2F4B42; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#F4F7F4"/>
  <rect x="60" y="56" width="1480" height="220" rx="22" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="110" y="140" class="title">Demo Flow: LINE MINI APP Food Ordering</text>
  <text x="112" y="190" class="subtitle">สแกน QR ที่โต๊ะ → เลือกเมนู → สร้าง QR ชำระเงิน → ร้านเห็นยอดและสถานะแจ้ง LINE</text>
  <rect x="112" y="218" width="260" height="38" rx="19" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.26)"/>
  <text x="136" y="244" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">สำหรับส่งให้ลูกค้าดู Demo</text>

  <g filter="url(#shadow)">
    <rect x="90" y="340" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DBE4DC"/>
    <circle cx="128" cy="378" r="20" fill="#16201C"/>
    <text x="122" y="385" class="num">1</text>
    <text x="160" y="376" class="label">Demo Guide</text>
    <text x="114" y="420" class="body">หน้าแรกสำหรับอธิบายภาพรวม</text>
    <text x="114" y="450" class="body">และเริ่มทดลองทุกส่วน</text>

    <rect x="470" y="340" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DBE4DC"/>
    <circle cx="508" cy="378" r="20" fill="#06C755"/>
    <text x="502" y="385" class="num">2</text>
    <text x="540" y="376" class="label">Mini App ลูกค้า</text>
    <text x="494" y="420" class="body">เปิดจาก QR โต๊ะ ระบบรู้</text>
    <text x="494" y="450" class="body">ร้านและโต๊ะอัตโนมัติ</text>

    <rect x="850" y="340" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DBE4DC"/>
    <circle cx="888" cy="378" r="20" fill="#FF704D"/>
    <text x="882" y="385" class="num">3</text>
    <text x="920" y="376" class="label">เลือกเมนู</text>
    <text x="874" y="420" class="body">เลือกรายการอาหาร จำนวน</text>
    <text x="874" y="450" class="body">และระบบรวมยอดทันที</text>

    <rect x="1230" y="340" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DBE4DC"/>
    <circle cx="1268" cy="378" r="20" fill="#20A7A0"/>
    <text x="1262" y="385" class="num">4</text>
    <text x="1300" y="376" class="label">QR Payment</text>
    <text x="1254" y="420" class="body">สร้าง Order Summary</text>
    <text x="1254" y="450" class="body">พร้อม QR Code ชำระเงิน</text>
  </g>

  <path d="M402 415H456" stroke="#06C755" stroke-width="6" stroke-linecap="round"/>
  <path d="M446 400L462 415L446 430" stroke="#06C755" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M782 415H836" stroke="#06C755" stroke-width="6" stroke-linecap="round"/>
  <path d="M826 400L842 415L826 430" stroke="#06C755" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1162 415H1216" stroke="#06C755" stroke-width="6" stroke-linecap="round"/>
  <path d="M1206 400L1222 415L1206 430" stroke="#06C755" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="280" y="585" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DBE4DC"/>
    <circle cx="318" cy="623" r="20" fill="#F5B83F"/>
    <text x="312" y="630" class="num">5</text>
    <text x="350" y="621" class="label">Dashboard ร้าน</text>
    <text x="304" y="665" class="body">เห็นร้าน โต๊ะ ยอดรอชำระ</text>
    <text x="304" y="695" class="body">และสถานะแจ้ง LINE</text>

    <rect x="650" y="585" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DBE4DC"/>
    <circle cx="688" cy="623" r="20" fill="#7B61FF"/>
    <text x="682" y="630" class="num">6</text>
    <text x="720" y="621" class="label">Table QR</text>
    <text x="674" y="665" class="body">รวม QR Code ของแต่ละโต๊ะ</text>
    <text x="674" y="695" class="body">สำหรับพิมพ์หรือติดโต๊ะ</text>

    <rect x="1020" y="585" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DBE4DC"/>
    <circle cx="1058" cy="623" r="20" fill="#16201C"/>
    <text x="1052" y="630" class="num">7</text>
    <text x="1090" y="621" class="label">Management</text>
    <text x="1044" y="665" class="body">โชว์การแก้ร้าน โต๊ะ เมนู</text>
    <text x="1044" y="695" class="body">ราคา และสถานะพร้อมขาย</text>
  </g>

  <path d="M1380 505C1380 555 1340 620 1332 657C1314 738 1230 772 1166 755" stroke="#06C755" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 14"/>
  <path d="M1010 660H966" stroke="#06C755" stroke-width="6" stroke-linecap="round"/>
  <path d="M976 645L960 660L976 675" stroke="#06C755" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M640 660H596" stroke="#06C755" stroke-width="6" stroke-linecap="round"/>
  <path d="M606 645L590 660L606 675" stroke="#06C755" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="190" y="820" width="1220" height="96" rx="18" fill="#EEF7F1" stroke="#D7EBDC"/>
  <text x="230" y="858" class="note-title">หมายเหตุสำหรับ Demo</text>
  <text x="230" y="892" class="note">เวอร์ชันนี้ใช้สำหรับดู flow และหน้าตาระบบก่อน ส่วน production จะเชื่อม LINE Official Account / LIFF, ฐานข้อมูลจริง และ payment verification</text>
</svg>
